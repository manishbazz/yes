<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Night Ledger — Manish &amp; Palak</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#14211F;
    --ink-2:#1C2C29;
    --paper:#F1EAD9;
    --paper-dim:#cfc6ae;
    --gold:#E8A33D;
    --crimson:#B8433D;
    --line: rgba(241,234,217,0.14);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--ink);
    color:var(--paper);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(232,163,61,0.06), transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(184,67,61,0.08), transparent 45%);
  }
  .wrap{
    max-width:720px;
    margin:0 auto;
    padding:48px 20px 80px;
  }

  /* ---- Header / marquee ---- */
  header{
    text-align:center;
    margin-bottom:44px;
  }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    letter-spacing:0.35em;
    text-transform:uppercase;
    font-size:11px;
    color:var(--gold);
    margin-bottom:10px;
  }
  h1{
    font-family:'Bebas Neue', sans-serif;
    font-weight:400;
    font-size:clamp(40px, 9vw, 64px);
    letter-spacing:0.03em;
    margin:0;
    line-height:1;
  }
  .names{
    margin-top:12px;
    font-family:'IBM Plex Mono', monospace;
    font-size:14px;
    color:var(--paper-dim);
  }
  .names b{ color:var(--paper); font-weight:600; }
  .sync-status{
    margin-top:10px;
    display:inline-block;
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--paper-dim);
    border:1px solid var(--line);
    border-radius:20px;
    padding:4px 10px;
  }
  .sync-status.live{ color:var(--gold); border-color:var(--gold); }
  .sync-status.error{ color:var(--crimson); border-color:var(--crimson); }

  /* ---- Add ticket form ---- */
  .entry{
    display:flex;
    gap:10px;
    background:var(--ink-2);
    border:1px solid var(--line);
    border-radius:10px;
    padding:10px;
    margin-bottom:36px;
  }
  .entry input[type=text]{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    color:var(--paper);
    font-family:'Inter',sans-serif;
    font-size:15px;
    padding:10px 8px;
  }
  .entry input[type=text]::placeholder{ color:var(--paper-dim); }
  .entry select{
    background:var(--ink);
    color:var(--paper-dim);
    border:1px solid var(--line);
    border-radius:6px;
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    padding:0 8px;
  }
  .entry button{
    background:var(--gold);
    color:var(--ink);
    border:none;
    border-radius:6px;
    font-family:'IBM Plex Mono', monospace;
    font-weight:600;
    letter-spacing:0.05em;
    font-size:13px;
    padding:0 18px;
    cursor:pointer;
    transition:filter .15s ease, transform .15s ease;
  }
  .entry button:hover{ filter:brightness(1.08); }
  .entry button:active{ transform:scale(0.96); }

  /* ---- Ticket stub cards ---- */
  .ticket{
    position:relative;
    display:flex;
    align-items:center;
    gap:16px;
    background:var(--ink-2);
    border:1px dashed var(--line);
    border-radius:10px;
    padding:16px 18px;
    margin-bottom:14px;
    animation:rise .35s ease both;
  }
  @keyframes rise{
    from{ opacity:0; transform:translateY(8px); }
    to{ opacity:1; transform:translateY(0); }
  }
  .ticket.top{
    border-color:var(--gold);
    box-shadow:0 0 0 1px rgba(232,163,61,0.25) inset;
  }
  .ticket .notch{
    position:absolute;
    width:16px; height:16px;
    background:var(--ink);
    border-radius:50%;
    top:50%; transform:translateY(-50%);
  }
  .ticket .notch.left{ left:-9px; }
  .ticket .notch.right{ right:-9px; }

  .stub-main{
    flex:1;
    min-width:0;
  }
  .stub-idea{
    font-size:16px;
    font-weight:500;
    word-break:break-word;
  }
  .stub-meta{
    margin-top:6px;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--paper-dim);
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
  }
  .pick-badge{
    font-size:10px;
    letter-spacing:0.08em;
    color:var(--ink);
    background:var(--gold);
    padding:2px 6px;
    border-radius:4px;
    font-weight:600;
  }

  /* tally marks */
  .tally{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
    align-items:center;
  }
  .bundle{
    position:relative;
    width:22px;
    height:20px;
  }
  .bundle svg{ width:100%; height:100%; display:block; }
  .bundle line{
    stroke:var(--paper);
    stroke-width:2;
    stroke-linecap:round;
  }
  .bundle .strike{ stroke:var(--crimson); }

  .count{
    font-family:'IBM Plex Mono', monospace;
    font-size:13px;
    color:var(--paper-dim);
  }

  .stub-actions{
    display:flex;
    flex-direction:column;
    gap:6px;
    align-items:stretch;
  }
  .btn{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.04em;
    border:1px solid var(--line);
    background:transparent;
    color:var(--paper);
    border-radius:6px;
    padding:7px 10px;
    cursor:pointer;
    white-space:nowrap;
    transition:background .15s ease, transform .1s ease, border-color .15s ease;
  }
  .btn:hover{ border-color:var(--gold); }
  .btn:active{ transform:scale(0.94); }
  .btn.punch{ color:var(--ink); background:var(--paper); }
  .btn.punch:hover{ filter:brightness(0.95); background:var(--paper); }
  .btn.remove{ color:var(--crimson); border-color:transparent; font-size:10px; opacity:0.7; }
  .btn.remove:hover{ opacity:1; }

  .empty{
    text-align:center;
    padding:50px 20px;
    color:var(--paper-dim);
    font-family:'IBM Plex Mono', monospace;
    font-size:13px;
    border:1px dashed var(--line);
    border-radius:10px;
  }

  footer{
    margin-top:50px;
    text-align:center;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--paper-dim);
    letter-spacing:0.04em;
  }
  footer span{ color:var(--gold); }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">Admit two &middot; Est. 2026</div>
    <h1>Date Night Ledger</h1>
    <div class="names"><b>Manish</b> &amp; <b>Palak</b> — punch a tally for every idea you're into</div>
    <div class="sync-status" id="syncStatus">connecting…</div>
  </header>

  <div class="entry">
    <input type="text" id="ideaInput" placeholder="Add a date idea… e.g. rooftop chai and old Bollywood songs" maxlength="120">
    <select id="whoInput">
      <option value="Manish">as Manish</option>
      <option value="Palak">as Palak</option>
    </select>
    <button id="addBtn">Add</button>
  </div>

  <div id="list"></div>

  <footer>synced live for both of you via <span>Firebase</span> — set FIREBASE_URL in the script to connect it</footer>
</div>

<script>
  // ====== CONNECT THIS TO YOUR OWN FIREBASE REALTIME DATABASE ======
  // 1. Create a free project at https://console.firebase.google.com
  // 2. Build > Realtime Database > Create Database (test mode is fine to start)
  // 3. Copy the database URL it gives you (looks like
  //    https://your-project-id-default-rtdb.firebaseio.com or with a
  //    region suffix, e.g. .asia-southeast1.firebasedatabase.app)
  // 4. Paste it below, keeping the trailing "/ideas.json"
  const FIREBASE_URL = 'https://date-ed728-default-rtdb.asia-southeast1.firebasedatabase.app';

  let ideas = [];
  let localStorageFallback = false;
  let stream = null;

  function seed(){
    return [
      { id: cryptoId(), text: 'Late-night momo run then a long drive with no destination', votes: { Manish: 2, Palak: 1 } },
      { id: cryptoId(), text: 'Rewatch our first movie together, blanket fort edition', votes: { Manish: 1, Palak: 3 } },
    ];
  }
  function cryptoId(){
    return 'id-' + Math.random().toString(36).slice(2, 10);
  }

  function setStatus(mode){
    const el = document.getElementById('syncStatus');
    if(mode === 'live'){ el.textContent = 'live — instant sync'; el.className = 'sync-status live'; }
    else if(mode === 'error'){ el.textContent = 'offline — saved on this device only'; el.className = 'sync-status error'; }
    else{ el.textContent = 'connecting…'; el.className = 'sync-status'; }
  }

  async function remoteSave(){
    const res = await fetch(FIREBASE_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(ideas)
    });
    if(!res.ok) throw new Error('bad response');
  }

  const STORAGE_KEY = 'date-night-ledger-v1';
  function localLoad(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : seed();
    }catch(e){ return seed(); }
  }
  function localSave(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(ideas)); }catch(e){}
  }

  // Opens a persistent connection to the database. Firebase pushes a "put"
  // event immediately with the current data, then another "put" every time
  // ANYONE (either of you) writes a change — no polling needed.
  function connectLive(){
    if(FIREBASE_URL.includes('YOUR-PROJECT-ID')){
      localStorageFallback = true;
      ideas = localLoad();
      setStatus('error');
      render();
      return;
    }

    stream = new EventSource(FIREBASE_URL);

    stream.addEventListener('put', (e)=>{
      const payload = JSON.parse(e.data);
      if(payload && payload.path === '/'){
        const val = payload.data;
        ideas = Array.isArray(val) ? val.filter(Boolean) : (val ? Object.values(val) : []);
      }
      setStatus('live');
      render();
    });

    stream.addEventListener('patch', ()=>{
      // full-array writes below don't normally trigger patches, but if one
      // arrives we just leave the current state — the next full put will sync it
    });

    stream.onerror = ()=>{
      setStatus('error');
      // EventSource retries connecting automatically; status flips back
      // to "live" once the connection recovers.
    };
  }

  async function save(){
    if(localStorageFallback){ localSave(); return; }
    try{
      await remoteSave();
      // no manual render needed — our own stream connection will receive
      // the update and re-render automatically
    }catch(e){
      setStatus('error');
      localSave();
    }
  }

  function totalVotes(idea){
    return (idea.votes.Manish||0) + (idea.votes.Palak||0);
  }

  function tallyMarksHTML(n){
    if(n === 0){
      return '<span class="count" style="opacity:.5">no punches yet</span>';
    }
    const bundles = Math.floor(n/5);
    const rem = n % 5;
    let html = '';
    for(let i=0;i<bundles;i++){
      html += bundleSVG(5);
    }
    if(rem > 0){ html += bundleSVG(rem); }
    return html;
  }
  function bundleSVG(strokes){
    // strokes: 1-5. 5th stroke is diagonal strike.
    const lines = [];
    const xs = [4,8,12,16];
    for(let i=0;i<Math.min(strokes,4);i++){
      lines.push(`<line x1="${xs[i]}" y1="2" x2="${xs[i]}" y2="18"/>`);
    }
    let strike = '';
    if(strokes === 5){
      strike = `<line class="strike" x1="2" y1="16" x2="18" y2="4"/>`;
    }
    return `<span class="bundle"><svg viewBox="0 0 22 20">${lines.join('')}${strike}</svg></span>`;
  }

  function render(){
    const list = document.getElementById('list');
    if(ideas.length === 0){
      list.innerHTML = '<div class="empty">The ledger is empty. Add the first idea above.</div>';
      return;
    }
    const sorted = [...ideas].sort((a,b)=> totalVotes(b) - totalVotes(a));
    const topScore = totalVotes(sorted[0]);

    list.innerHTML = sorted.map(idea => {
      const total = totalVotes(idea);
      const isTop = total > 0 && total === topScore;
      return `
        <div class="ticket ${isTop ? 'top' : ''}">
          <span class="notch left"></span>
          <span class="notch right"></span>
          <div class="stub-main">
            <div class="stub-idea">${escapeHTML(idea.text)}</div>
            <div class="stub-meta">
              <span class="tally">${tallyMarksHTML(total)}</span>
              <span class="count">${total} ${total===1?'punch':'punches'} &middot; M:${idea.votes.Manish||0} P:${idea.votes.Palak||0}</span>
              ${isTop ? '<span class="pick-badge">TOP PICK</span>' : ''}
            </div>
          </div>
          <div class="stub-actions">
            <button class="btn punch" data-action="vote" data-id="${idea.id}">+ punch</button>
            <button class="btn remove" data-action="remove" data-id="${idea.id}">remove</button>
          </div>
        </div>
      `;
    }).join('');
  }

  function escapeHTML(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  document.getElementById('addBtn').addEventListener('click', addIdea);
  document.getElementById('ideaInput').addEventListener('keydown', (e)=>{
    if(e.key === 'Enter') addIdea();
  });
  async function addIdea(){
    const input = document.getElementById('ideaInput');
    const text = input.value.trim();
    if(!text) return;
    ideas.push({ id: cryptoId(), text, votes: { Manish:0, Palak:0 } });
    input.value = '';
    render();
    await save();
  }

  document.getElementById('list').addEventListener('click', async (e)=>{
    const btn = e.target.closest('button[data-action]');
    if(!btn) return;
    const id = btn.getAttribute('data-id');
    const action = btn.getAttribute('data-action');
    const idea = ideas.find(i => i.id === id);
    if(!idea) return;

    if(action === 'vote'){
      const who = document.getElementById('whoInput').value;
      idea.votes[who] = (idea.votes[who]||0) + 1;
    } else if(action === 'remove'){
      ideas = ideas.filter(i => i.id !== id);
    }
    render();
    await save();
  });

  (function init(){
    connectLive();
    render();
  })();
</script>
</body>
</html>

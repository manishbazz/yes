<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Ideas — Manish &amp; Palak</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-a:#F6F0FF;
    --bg-b:#EFEAFB;
    --card:#FFFFFF;
    --ink:#3B2E4E;
    --ink-soft:#8C82A3;
    --lilac:#D2AFFF;
    --lilac-deep:#8A54D9;
    --sage:#7FAE96;
    --gold:#D9A85C;
    --line: rgba(59,46,78,0.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    font-family:'Inter', sans-serif;
    color:var(--ink);
    background: linear-gradient(155deg, var(--bg-a), var(--bg-b));
  }
  .wrap{
    position:relative;
    z-index:1;
    max-width:660px;
    margin:0 auto;
    padding:52px 20px 80px;
  }

  /* ---- Floating memes (background layer) ---- */
  .meme-layer{
    position:fixed;
    inset:0;
    overflow:hidden;
    pointer-events:none;
    z-index:0;
  }
  .meme-float{
    position:absolute;
    bottom:-220px;
    border-radius:12px;
    box-shadow:0 10px 24px rgba(59,46,78,0.18);
    opacity:0;
    animation:memeFloat linear forwards;
  }
  @keyframes memeFloat{
    0%{ transform:translateY(0) rotate(var(--rot-start)); opacity:0; }
    12%{ opacity:0.8; }
    88%{ opacity:0.8; }
    100%{ transform:translateY(-135vh) rotate(var(--rot-end)); opacity:0; }
  }
  @media (prefers-reduced-motion: reduce){
    .meme-layer{ display:none; }
  }

  /* ---- Header ---- */
  header{ text-align:center; margin-bottom:38px; }
  .eyebrow{
    font-size:11px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--lilac-deep);
    font-weight:600;
    margin-bottom:14px;
  }
  h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-style:italic;
    font-size:clamp(30px, 6.5vw, 42px);
    margin:0;
    line-height:1.15;
    color:var(--ink);
  }
  .names{
    margin-top:10px;
    font-size:14px;
    color:var(--ink-soft);
  }
  .names b{ color:var(--ink); font-weight:600; }

  .sync-status{
    margin-top:16px;
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:11px;
    font-weight:500;
    color:var(--ink-soft);
    border:1px solid var(--line);
    border-radius:999px;
    padding:4px 12px;
  }
  .sync-status.live{ color:#4C8E6E; border-color:rgba(76,142,110,0.3); }
  .sync-status.error{ color:var(--lilac-deep); border-color:rgba(138,84,217,0.3); }
  .sync-status .dot{
    width:6px; height:6px; border-radius:50%;
    background:currentColor;
  }

  /* ---- Add form ---- */
  .entry{
    display:flex;
    gap:8px;
    background:var(--card);
    border-radius:14px;
    padding:8px;
    margin-bottom:28px;
    box-shadow:0 1px 3px rgba(59,46,62,0.06);
  }
  .entry input[type=text]{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    color:var(--ink);
    font-family:'Inter', sans-serif;
    font-size:14px;
    padding:10px 10px;
  }
  .entry input[type=text]::placeholder{ color:#C4B9C6; }
  .entry select{
    background:#F7F2F8;
    color:var(--ink-soft);
    border:none;
    border-radius:8px;
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size:12px;
    padding:0 10px;
  }
  .entry button{
    background:var(--ink);
    color:#fff;
    border:none;
    border-radius:8px;
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size:13px;
    padding:0 18px;
    cursor:pointer;
    transition:opacity .15s ease;
  }
  .entry button:hover{ opacity:0.85; }
  .entry button:active{ opacity:0.7; }

  .sort-bar{
    display:flex;
    justify-content:flex-end;
    align-items:center;
    gap:8px;
    margin:-16px 0 18px;
    font-size:11.5px;
    color:var(--ink-soft);
  }
  .sort-bar select{
    background:rgba(255,255,255,0.75);
    color:var(--ink);
    border:1px solid var(--line);
    border-radius:8px;
    font-family:'Inter', sans-serif;
    font-size:11.5px;
    padding:7px 9px;
  }

  /* ---- Date cards ---- */
  .card{
    position:relative;
    display:flex;
    align-items:center;
    gap:14px;
    background:var(--card);
    border-radius:14px;
    padding:16px 16px;
    margin-bottom:12px;
    box-shadow:0 1px 3px rgba(59,46,62,0.06);
    animation:rise .25s ease both;
  }
  @keyframes rise{
    from{ opacity:0; transform:translateY(6px); }
    to{ opacity:1; transform:translateY(0); }
  }
  .card.top{
    box-shadow:0 0 0 1.5px var(--gold), 0 1px 3px rgba(59,46,62,0.06);
  }

  .card-main{ flex:1; min-width:0; }
  .card-idea{
    font-weight:500;
    font-size:15px;
    color:var(--ink);
    word-break:break-word;
  }
  .card-meta{
    margin-top:9px;
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
  }

  .hearts{ display:flex; gap:2px; flex-wrap:wrap; align-items:center; }
  .hearts .cluster{ display:inline-flex; gap:1px; margin-right:5px; }
  .hearts svg{ width:12px; height:12px; display:block; }
  .no-hearts{ font-size:12px; color:#C4B9C6; }

  .count{
    font-size:11.5px;
    color:var(--ink-soft);
    font-weight:500;
  }
  .pick-badge{
    font-size:10.5px;
    font-weight:600;
    letter-spacing:0.03em;
    color:#8A6A28;
    background:rgba(217,168,92,0.16);
    padding:3px 9px;
    border-radius:999px;
  }

  .card-actions{
    display:flex;
    flex-direction:column;
    gap:6px;
    align-items:stretch;
  }
  .btn{
    font-family:'Inter', sans-serif;
    font-size:11.5px;
    font-weight:600;
    border:1px solid var(--line);
    background:transparent;
    color:var(--ink);
    border-radius:8px;
    padding:7px 12px;
    cursor:pointer;
    white-space:nowrap;
    transition:background .15s ease, border-color .15s ease;
  }
  .btn:active{ transform:scale(0.96); }
  .btn.punch{
    color:#fff;
    background:var(--lilac-deep);
    border-color:var(--lilac-deep);
  }
  .btn.punch:hover{ opacity:0.88; }
  .btn.punch:disabled{
    cursor:not-allowed;
    opacity:0.45;
    background:var(--ink-soft);
    border-color:var(--ink-soft);
  }
  .btn.remove{
    color:var(--ink-soft);
    border-color:transparent;
    font-weight:400;
    opacity:0.7;
  }
  .btn.remove:hover{ opacity:1; color:var(--lilac-deep); }

  .empty{
    text-align:center;
    padding:44px 24px;
    color:var(--ink-soft);
    font-size:13.5px;
    background:var(--card);
    border-radius:14px;
    box-shadow:0 1px 3px rgba(59,46,62,0.06);
  }

  footer{
    margin-top:40px;
    text-align:center;
    font-size:11.5px;
    color:var(--ink-soft);
  }
  footer span{ color:var(--lilac-deep); font-weight:600; }

  /* ---- Mobile ---- */
  @media (max-width: 560px){
    .wrap{ padding:36px 14px 60px; }
    header{ margin-bottom:28px; }
    h1{ font-size:32px; }
    .names{ font-size:13px; padding:0 8px; }

    .entry{
      flex-wrap:wrap;
      padding:10px;
    }
    .entry input[type=text]{
      flex:1 1 100%;
      font-size:16px; /* prevents iOS auto-zoom on focus */
      padding:10px 8px;
    }
    .entry select{
      flex:1;
      font-size:13px;
      padding:10px 8px;
    }
    .entry button{
      flex:0 0 auto;
      padding:0 20px;
      font-size:14px;
    }

    .card{
      flex-direction:column;
      align-items:stretch;
      gap:12px;
      padding:16px 14px;
    }
    .card-idea{ font-size:15.5px; }
    .card-meta{ gap:8px; }

    .card-actions{
      flex-direction:row;
      justify-self: stretch;
    }
    .btn{
      flex:1;
      text-align:center;
      padding:10px 12px;
      font-size:12.5px;
    }
    .btn.remove{
      flex:0 0 auto;
      padding:10px 14px;
    }
  }
</style>
</head>
<body>
<div class="meme-layer" id="memeLayer"></div>
<div class="wrap">

  <header>
    <div class="eyebrow">Admit two &middot; est. 2026</div>
    <h1>Date Ideas</h1>
    <div class="names"><b>Manish</b> &amp; <b>Palak</b> — mark the ones you're into</div>
    <div class="sync-status" id="syncStatus"><span class="dot"></span><span id="syncText">connecting…</span></div>
  </header>

  <div class="entry">
    <input type="text" id="ideaInput" placeholder="Add a date idea… e.g. Manish ki seva karna" maxlength="120">
    <select id="whoInput">
      <option value="Manish">as Manish</option>
      <option value="Palak">as Palak</option>
    </select>
    <button id="addBtn">Add</button>
  </div>

  <div class="sort-bar">
    <label for="sortInput">Sort by</label>
    <select id="sortInput">
      <option value="top">Top pick</option>
      <option value="newest">Recently added</option>
      <option value="oldest">Oldest first</option>
    </select>
  </div>

  <div id="list"></div>

  <footer>made with <span>♥</span> — </footer>
</div>

<script>
  // ====== CONNECT THIS TO YOUR OWN FIREBASE REALTIME DATABASE ======
  // 1. Create a free project at https://console.firebase.google.com
  // 2. Build > Realtime Database > Create Database (test mode is fine to start)
  // 3. Copy the database URL it gives you (looks like
  //    https://your-project-id-default-rtdb.firebaseio.com or with a
  //    region suffix, e.g. .asia-southeast1.firebasedatabase.app)
  // 4. Paste it below, keeping the trailing "/ideas.json"
  const FIREBASE_URL = 'https://date-ed728-default-rtdb.asia-southeast1.firebasedatabase.app/ideas.json';

  let ideas = [];
  let localStorageFallback = false;
  let stream = null;

  function seed(){
    return [
      { id: cryptoId(), createdAt: Date.now() - 2000, text: 'Late-night momo run then a long drive with no destination', votes: { Manish: 2, Palak: 1 } },
      { id: cryptoId(), createdAt: Date.now() - 1000, text: 'Rewatch our first movie together, blanket fort edition', votes: { Manish: 1, Palak: 3 } },
    ];
  }
  function cryptoId(){
    return 'id-' + Math.random().toString(36).slice(2, 10);
  }

  function setStatus(mode){
    const el = document.getElementById('syncStatus');
    const txt = document.getElementById('syncText');
    if(mode === 'live'){ txt.textContent = 'live — instant sync'; el.className = 'sync-status live'; }
    else if(mode === 'error'){ txt.textContent = 'offline — saved on this device only'; el.className = 'sync-status error'; }
    else{ txt.textContent = 'connecting…'; el.className = 'sync-status'; }
  }

  async function remoteSave(){
    const res = await fetch(FIREBASE_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(ideas)
    });
    if(!res.ok) throw new Error('bad response');
  }

  const STORAGE_KEY = 'date-night-ledger-v1';
  function localLoad(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : seed();
    }catch(e){ return seed(); }
  }
  function localSave(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(ideas)); }catch(e){}
  }

  // Opens a persistent connection to the database. Firebase pushes a "put"
  // event immediately with the current data, then another "put" every time
  // ANYONE (either of you) writes a change — no polling needed.
  function connectLive(){
    if(FIREBASE_URL.includes('YOUR-PROJECT-ID')){
      localStorageFallback = true;
      ideas = localLoad();
      setStatus('error');
      render();
      return;
    }

    stream = new EventSource(FIREBASE_URL);

    stream.addEventListener('put', (e)=>{
      const payload = JSON.parse(e.data);
      if(payload && payload.path === '/'){
        const val = payload.data;
        ideas = Array.isArray(val) ? val.filter(Boolean) : (val ? Object.values(val) : []);
        ideas.forEach((idea, index) => {
          if(!idea.createdAt) idea.createdAt = Date.now() - (ideas.length - index);
          if(!idea.votes) idea.votes = { Manish: 0, Palak: 0 };
          if(!idea.votes.Manish) idea.votes.Manish = 0;
          if(!idea.votes.Palak) idea.votes.Palak = 0;
        });
      }
      setStatus('live');
      render();
    });

    stream.addEventListener('patch', ()=>{
      // full-array writes below don't normally trigger patches, but if one
      // arrives we just leave the current state — the next full put will sync it
    });

    stream.onerror = ()=>{
      setStatus('error');
      // EventSource retries connecting automatically; status flips back
      // to "live" once the connection recovers.
    };
  }

  async function save(){
    if(localStorageFallback){ localSave(); return; }
    try{
      await remoteSave();
      // no manual render needed — our own stream connection will receive
      // the update and re-render automatically
    }catch(e){
      setStatus('error');
      localSave();
    }
  }

  // so there's nothing extra to upload — just this one index.html.
  // To add your own: convert an image to base64 (many free sites do this,
  // or ask me), then add a new string to this array in the same format:

  ];

  function spawnMeme(){
    if(MEME_IMAGES.length === 0) return;
    const layer = document.getElementById('memeLayer');
    const img = document.createElement('img');
    img.src = MEME_IMAGES[Math.floor(Math.random()*MEME_IMAGES.length)];
    img.className = 'meme-float';

    const size = 70 + Math.random()*70;        // 70-140px wide
    const left = 2 + Math.random()*86;          // keep mostly on-screen
    const duration = 12 + Math.random()*8;       // 12-20s float
    const rotStart = (Math.random()*16 - 8).toFixed(1) + 'deg';
    const rotEnd = (Math.random()*30 - 15).toFixed(1) + 'deg';

    img.style.width = size + 'px';
    img.style.left = left + '%';
    img.style.animationDuration = duration + 's';
    img.style.setProperty('--rot-start', rotStart);
    img.style.setProperty('--rot-end', rotEnd);

    layer.appendChild(img);
    setTimeout(()=> img.remove(), duration*1000 + 500);
  }

  function startMemes(){
    if(MEME_IMAGES.length === 0) return;
    spawnMeme();
    setInterval(()=>{
      spawnMeme();
    }, 4500 + Math.random()*3000);
  }

  function totalVotes(idea){
    return (idea.votes.Manish||0) + (idea.votes.Palak||0);
  }

  function heartSVG(){
    return `<svg viewBox="0 0 24 24" fill="var(--lilac-deep)"><path d="M12 21s-7.2-4.6-10-9.3C.4 8.6 2 5 5.6 5c2 0 3.4 1.1 4.4 2.6C11 6.1 12.4 5 14.4 5 18 5 19.6 8.6 22 11.7 19.2 16.4 12 21 12 21z"/></svg>`;
  }

  function heartsHTML(n){
    if(n === 0){
      return '<span class="no-hearts">no marks yet</span>';
    }
    const bundles = Math.floor(n/5);
    const rem = n % 5;
    let html = '';
    for(let i=0;i<bundles;i++){
      html += `<span class="cluster">${heartSVG().repeat(5)}</span>`;
    }
    if(rem > 0){
      html += `<span class="cluster">${heartSVG().repeat(rem)}</span>`;
    }
    return html;
  }

  function getSortMode(){
    return document.getElementById('sortInput').value;
  }

  function render(){
    const list = document.getElementById('list');
    if(ideas.length === 0){
      list.innerHTML = '<div class="empty">Nothing here yet. Add your first date idea above.</div>';
      return;
    }

    const sortMode = getSortMode();
    const sorted = [...ideas].sort((a,b)=>{
      if(sortMode === 'newest') return (b.createdAt||0) - (a.createdAt||0);
      if(sortMode === 'oldest') return (a.createdAt||0) - (b.createdAt||0);
      return totalVotes(b) - totalVotes(a) || (b.createdAt||0) - (a.createdAt||0);
    });

    const topScore = Math.max(...ideas.map(totalVotes));

    list.innerHTML = sorted.map(idea => {
      const total = totalVotes(idea);
      const isTop = total > 0 && total === topScore;
      const who = document.getElementById('whoInput').value;
      const myMarks = idea.votes[who] || 0;
      const maxMarks = 3;

      return `
        <div class="card ${isTop ? 'top' : ''}">
          <div class="card-main">
            <div class="card-idea">${escapeHTML(idea.text)}</div>
            <div class="card-meta">
              <span class="hearts">${heartsHTML(total)}</span>
              <span class="count">${total} ${total===1?'mark':'marks'} &middot; M ${idea.votes.Manish||0} · P ${idea.votes.Palak||0}</span>
              ${isTop ? '<span class="pick-badge">Top pick</span>' : ''}
            </div>
          </div>
          <div class="card-actions">
            <button class="btn punch" data-action="vote" data-id="${idea.id}" ${myMarks >= maxMarks ? 'disabled' : ''}>
              ${myMarks >= maxMarks ? '3/3 marks' : '+ mark'}
            </button>
            <button class="btn remove" data-action="unvote" data-id="${idea.id}" ${myMarks <= 0 ? 'disabled' : ''}>
              ${myMarks > 0 ? '− revert mark' : 'no marks'}
            </button>
            <button class="btn remove" data-action="remove" data-id="${idea.id}">remove</button>
          </div>
        </div>
      `;
    }).join('');
  }

  function escapeHTML(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  document.getElementById('whoInput').addEventListener('change', render);
  document.getElementById('sortInput').addEventListener('change', render);

  document.getElementById('addBtn').addEventListener('click', addIdea);
  document.getElementById('ideaInput').addEventListener('keydown', (e)=>{
    if(e.key === 'Enter') addIdea();
  });
  async function addIdea(){
    const input = document.getElementById('ideaInput');
    const text = input.value.trim();
    if(!text) return;
    ideas.push({ id: cryptoId(), createdAt: Date.now(), text, votes: { Manish:0, Palak:0 } });
    input.value = '';
    render();
    await save();
  }

  document.getElementById('list').addEventListener('click', async (e)=>{
    const btn = e.target.closest('button[data-action]');
    if(!btn) return;
    const id = btn.getAttribute('data-id');
    const action = btn.getAttribute('data-action');
    const idea = ideas.find(i => i.id === id);
    if(!idea) return;

    if(action === 'vote'){
      const who = document.getElementById('whoInput').value;
      if((idea.votes[who] || 0) >= 3) return;
      idea.votes[who] = (idea.votes[who] || 0) + 1;
    } else if(action === 'unvote'){
      const who = document.getElementById('whoInput').value;
      if((idea.votes[who] || 0) <= 0) return;
      idea.votes[who] -= 1;
    } else if(action === 'remove'){
      ideas = ideas.filter(i => i.id !== id);
    }
    render();
    await save();
  });

  (function init(){
    connectLive();
    render();
    startMemes();
  })();
</script>
